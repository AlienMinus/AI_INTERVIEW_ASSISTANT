<!DOCTYPE html>
<html>
<head>
    <title>AI Interview</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<div class="container">

    <!-- NAVBAR -->
    <div class="navbar">
        <div class="logo">
            <i class="fa-solid fa-sparkles"></i> AI Interview
        </div>

        <div class="nav-links">
            <button id="navDashboard"><i class="fa-solid fa-home"></i></button>
            <button id="navInterview"><i class="fa-solid fa-robot"></i></button>
            <button id="navHistory"><i class="fa-solid fa-clock"></i></button>
            <button id="navSettings"><i class="fa-solid fa-gear"></i></button>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" class="section active">
        <h2>Dashboard</h2>
        <p>Total Interviews: <span id="totalCount">0</span></p>
        <p>Average Score: <span id="avgScore">0</span></p>
        <div class="chart-container">
            <h3>Performance Trend</h3>
            <svg id="scoreChart" viewBox="0 0 340 150"></svg>
        </div>
    </div>

    <!-- INTERVIEW -->
    <div id="interview" class="section">
        <h2>Interview</h2>

        <button id="startInterviewBtn">Start Interview</button>

        <div id="questionBox"></div>

        <textarea id="answerInput" placeholder="Type your answer..."></textarea>
        <button id="submitBtn">Submit Answer</button>

        <div id="resultBox"></div>
    </div>

    <!-- HISTORY -->
    <div id="history" class="section">
        <h2>History</h2>
        <button id="clearHistoryBtn" class="danger-btn">
        Clear History
    </button>
        <div id="historyList"></div>
    </div>

    <!-- SETTINGS -->
    <div id="settings" class="section">
        <h2>Settings</h2>

        <input type="text" id="apiKeyInput" placeholder="Enter RapidAPI Key">
        <button id="saveApiBtn">Save Key</button>

        <h3>Job Description</h3>
        <textarea id="jobDescInput" placeholder="Paste Job Description here"></textarea>

        <h3>Resume</h3>
        <div id="dropZone" class="drop-zone">
            <i class="fa-solid fa-cloud-arrow-up"></i>
            <p>Drag & Drop or Click to Upload</p>
            <input type="file" id="fileInput" accept=".docx, .pdf" style="display: none;">
        </div>
        <div id="fileNameDisplay" class="file-name-display"></div>

        <div style="display: flex; gap: 10px; margin-bottom: 10px;">
            <button id="extractTextBtn" style="flex: 1;">Extract Text</button>
            <button id="clearResumeBtn" class="danger-btn" style="padding: 0 15px;" title="Clear"><i class="fa-solid fa-trash"></i></button>
        </div>
        <div id="status"></div>
        <textarea id="resumeInput" placeholder="Paste Resume text here"></textarea>

        <button id="saveProfileBtn">Save Profile</button>
    </div>

</div>

<script src="popup.js"></script>
</body>
</html>
